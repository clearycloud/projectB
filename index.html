<!DOCTYPE html>
<html lang="ko">
<head>

  <title>분리수거 도우미</title>

</head>

<body>

      <button onclick="showInfo('제주도')">제주도</button>

    </div>

    <div id="result" class="card">
      <h2>지역을 선택하세요</h2>
    </div>

  </div>

  <script src="script.js"></script>
